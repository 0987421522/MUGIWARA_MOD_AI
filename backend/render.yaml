services:
  - type: web
    name: mugiwara-mod-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: APP_SECRET
        value: mugiwara_secret_2025
